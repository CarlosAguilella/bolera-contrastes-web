<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta name="theme-color" content="#C8552B"/>
  <title>Pago no completado — Bolera Contrastes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300..700&display=swap"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <main class="bc-container" style="min-height:100vh;display:grid;place-items:center;padding-top:var(--s-7);padding-bottom:var(--s-7);">
    <section class="delivery-checkout" style="max-width:760px;margin:0;">
      <span class="eyebrow">Pedido online</span>
      <h1 class="h-section" style="margin-top:10px;">Pago no completado</h1>
      <p class="muted pretty" style="font-size:18px;max-width:58ch;">
        El banco no ha autorizado el pago o la operación se ha cancelado. No se ha confirmado ningún pedido.
      </p>
      <p class="muted pretty">
        Puedes volver a la carta e intentarlo de nuevo, o llamar al local si necesitas ayuda.
      </p>
      <div style="display:flex;gap:var(--s-3);flex-wrap:wrap;margin-top:var(--s-5);">
        <a class="btn btn-primary" href="/">Volver a la carta</a>
        <a class="btn btn-secondary" href="tel:+34964771290">Llamar al local</a>
      </div>
    </section>
  </main>
</body>
</html>
